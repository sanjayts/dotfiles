# vim:fileencoding=utf-8:foldmethod=marker

# Atom
include current-theme.conf
# END_KITTY_THEME


macos_option_as_alt yes

# BEGIN_KITTY_FONTS
font_size 18.0
font_family      family="FiraMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# Shift+Enter fix for Claude Code in tmux: force Kitty to always send the
# CSI u sequence, bypassing keyboard protocol negotiation which tmux blocks.
# Must use \e (not \x1b) for escape in Kitty config.
# See ~/.tmux.conf for the other half of this fix.
map shift+enter send_text all \e[13;2u

# Reduce scroll speed for better reading continuity in tmux
# Default is 5.0 -- lower means fewer lines per mouse wheel notch
wheel_scroll_multiplier 2.0

# Karabiner sends Option+3 for UK # character -- intercept and send literal #
# so it works consistently inside and outside tmux (tmux mangles 3 escape sequence).
map opt+3 send_text all #
