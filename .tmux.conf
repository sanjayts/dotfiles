# ─── General ────────────────────────────────────────
# Enable mouse support (scroll, click to switch panes, resize)
set -g mouse on

# Start window/pane numbering at 1 (0 is far from other keys)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Large scrollback for long-running agentic sessions
set -g history-limit 500000

# Reduce escape delay (important for Neovim)
set -sg escape-time 10

# ─── Shift+Enter Fix for Claude Code in tmux ────────
# Problem: tmux blocks the Kitty keyboard protocol negotiation, so apps like
# Claude Code never receive Shift+Enter (they just get plain Enter).
# Fix has two parts:
#   1. Kitty side (kitty.conf): force Kitty to always send CSI u sequence
#      for Shift+Enter: map shift+enter send_text all \e[13;2u
#      (must use \e not \x1b -- Kitty config parser requires \e for escape)
#   2. tmux side (below): decode the CSI u sequence and re-send it to the app
set -s extended-keys on
set -as terminal-features 'tmux-256color:extkeys'
bind-key -n S-Enter send-keys Escape "[13;2u"

# Enable true color support (for Neovim themes)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-kitty:Tc"

# Use vi keys in copy mode (matches Neovim muscle memory)
set -g mode-keys vi

# Enable focus events (for Neovim autoread)
set -g focus-events on

# ─── Prefix Key ─────────────────────────────────────
# Use Ctrl+Space as prefix (easier than Ctrl+b)
unbind C-b
set -g prefix C-Space
# Note: C-Space (send-prefix) is rebound below to open the fuzzy window picker

# ─── Window (Tab) Navigation ────────────────────────
# Create new window (tab) -- default tmux behavior
bind c new-window -c "#{pane_current_path}"

# Customize mode (moved from default `C` since we use `C` for new-session)
bind C-c customize-mode -Z

# Switch windows using prefix+1..9 (tmux default)

# ─── Pane (Split) Management ────────────────────────
# Split panes with intuitive keys (in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation with Ctrl+hjkl (no prefix needed)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Resize panes with prefix + arrow keys
bind -r Up resize-pane -U 5
bind -r Down resize-pane -D 5
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5

# ─── Session (Workspace) Management ─────────────────
# Native session tree (fallback)
bind s choose-tree -sZ

# Create new session from within tmux
bind C command-prompt -p "New session name:" "new-session -s '%%'"

# Toggle last session
bind L switch-client -l

# Previous/next window within session (repeat: sticky)
bind -r p previous-window
bind -r n next-window

# Shift current window left/right in the window list (repeat: sticky)
# Using Shift+Left/Right to avoid conflict with default < and > display-menu bindings
bind -r S-Left swap-window -t -1 \; previous-window
bind -r S-Right swap-window -t +1 \; next-window

# How long the prefix stays "sticky" for repeat bindings (default 500ms)
set -g repeat-time 1000


# Fuzzy window picker across all sessions
bind C-Space display-popup -E -w 80% -h 60% "\
  tmux list-windows -a -F '#{session_name}:#{window_index} | #{session_name} > #{window_index}: #{window_name}  (#{pane_current_command})' \
  | fzf --ansi --reverse --prompt='Switch to window: ' --delimiter='\\|' --with-nth=2 \
  | cut -d'|' -f1 | tr -d ' ' \
  | xargs -I{} tmux switch-client -t '{}'"

# ─── Status Bar ─────────────────────────────────────
# Show session name on the left, windows in center
set -g status-position top
set -g status-style "bg=colour235,fg=colour248"
set -g status-left " #[fg=colour214,bold]#S #[fg=colour248]| "
set -g status-left-length 30
set -g status-right " %H:%M "

# Active window styling (light purple to distinguish from gold session name)
setw -g window-status-current-style "fg=colour183,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# ─── Terminal Bell for Agent Notifications ───────────
# Visual bell (highlights window in status bar when agent finishes)
set -g visual-bell off
setw -g monitor-bell on

# ─── Scroll Behavior ────────────────────────────────
# Half-page scroll instead of full-page for reading continuity (overlap)
bind-key -T copy-mode-vi PageUp send-keys -X halfpage-up
bind-key -T copy-mode-vi PageDown send-keys -X halfpage-down

# Mouse scroll 3 lines at a time (default is 5, which feels jumpy)
bind-key -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 3 scroll-up
bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 3 scroll-down

# Enter copy mode smoothly on first mouse scroll (3 lines at a time)
bind-key -T root WheelUpPane if-shell -F "#{alternate_on}" "send-keys -M" "select-pane -t= ; copy-mode -e ; send-keys -X -N 3 scroll-up"
bind-key -T root WheelDownPane if-shell -F "#{alternate_on}" "send-keys -M" "select-pane -t= ; send-keys -X -N 3 scroll-down"

# ─── Reload Config ──────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ─── Plugins (via TPM) ─────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# ─── Session Persistence ───────────────────────────
# Auto-save sessions every 15 minutes
set -g @continuum-save-interval '60'

# Auto-restore sessions when tmux starts
set -g @continuum-restore 'on'

# Resurrect: also save and restore pane contents
set -g @resurrect-capture-pane-contents 'on'

# Resurrect: restore Neovim sessions
set -g @resurrect-strategy-nvim 'session'

# Auto-install TPM and listed plugins on first run (fresh machine bootstrap)
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
